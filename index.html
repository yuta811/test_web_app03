<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>ABORT RUN</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at top, #101833 0%, #04060d 65%); font-family: Inter, system-ui, -apple-system, sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { width: 100%; height: 100%; display: block; filter: drop-shadow(0 0 16px rgba(101, 185, 255, .12)); }
    #infoBtn { position: fixed; right: 18px; top: 18px; width: 44px; height: 44px; border: 1px solid rgba(210,230,255,.45); border-radius: 50%; background: rgba(14,24,45,.75); color: #dff2ff; font: 700 22px/1 sans-serif; z-index: 5; cursor: pointer; }
    #infoBtn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div id="app"><canvas id="gameCanvas"></canvas><button id="infoBtn" aria-label="障害物説明を開く">?</button></div>

  <script>
    (() => {
      const GameState = { TITLE: 'title', READY: 'ready', PLAYING: 'playing', CLEAR: 'clear', GAME_OVER: 'game_over', PAUSED: 'paused' };
      const PLAYER = { groundAcceleration: 900, maxGroundSpeed: 650, minJumpPower: 520, baseJumpPower: 455, jumpPowerFromSpeed: 0.72, maxJumpPower: 920, gravity: 1450, airFloatStrength: 13.2, airBrake: 420, minAirSpeed: 120, width: 42, height: 58 };
      const MISSILE = { timeLimit: 60, baseLoadSpeed: 100 / 60 };
      const STAGE_LENGTH = 6000;
      const FALL_DEATH_Y = 1100;
      const GAME_VERSION = 'v1.5.0';

      const canvas = document.getElementById('gameCanvas');
      const infoBtn = document.getElementById('infoBtn');
      const ctx = canvas.getContext('2d');
      const particles = [];

      const state = { mode: GameState.TITLE, prevMode: GameState.TITLE, readyTimer: 0.7, camX: 0, hold: false, gameTime: 0, bestSpeed: 0, loadNoiseHit: false, loadNoiseTaken: 0, warningPulse: 0, hitFlashTimer: 0, pulseTime: 0, delayCoreTaken: 0, showInfo: false };
      let readyTimeoutId = null;
      const player = { x: 80, y: 420, vx: 0, vy: 0, width: PLAYER.width, height: PLAYER.height, grounded: true, effects: { heavyGravityTimer: 0, loadBoostTimer: 0 } };
      const missile = { progress: 0 };

      const GOAL_X = 5880;
      const levelObjects = [
        { type: 'platform', x: 0, y: 520, width: 820, height: 80 }, { type: 'platform', x: 980, y: 520, width: 620, height: 80 }, { type: 'platform', x: 1770, y: 520, width: 540, height: 80 },
        { type: 'mud_floor', x: 1880, y: 498, width: 300, height: 22, slowPower: 260 }, { type: 'platform', x: 2380, y: 520, width: 760, height: 80 },
        { type: 'boost_pad', x: 2460, y: 496, width: 220, height: 24, boostPower: 390 }, { type: 'platform', x: 3190, y: 520, width: 510, height: 80 },
        { type: 'headwind_zone', x: 3160, y: 240, width: 300, height: 280, gravityMultiplier: 1.58, duration: 2.2 }, { type: 'platform', x: 3900, y: 520, width: 260, height: 80 },
        { type: 'platform', x: 4300, y: 500, width: 220, height: 80 }, { type: 'platform', x: 4620, y: 470, width: 220, height: 80 }, { type: 'platform', x: 4940, y: 500, width: 220, height: 80 },
        { type: 'platform', x: 5260, y: 520, width: 840, height: 80 },
        { type: 'jammer_spike', x: 3600, y: 460, width: 62, height: 60, loadMultiplier: 1.65, duration: 2.6 },
        { type: 'laser_gate', x: 4180, y: 130, width: 32, height: 300 },
        { type: 'delay_core', x: 4725, y: 410, width: 48, height: 48, loadReduce: 6.5, consumed: false },
        { type: 'goal', x: GOAL_X, y: 430, width: 80, height: 90 }
      ];

      const intersect = (a,b)=> a.x < b.x+b.width && a.x+a.width > b.x && a.y < b.y+b.height && a.y+a.height > b.y;
      const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));
      const hasReachedGoalLine = () => player.x + player.width >= GOAL_X;
      const FIXED_VIEW = { w: 1280, h: 720 };
      let viewport = { w: FIXED_VIEW.w, h: FIXED_VIEW.h };

      let audioCtx; let bgmInterval;
      const sfx = (freq, type='sine', dur=0.08, gain=0.05) => {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = gain;
        o.connect(g).connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur); o.stop(audioCtx.currentTime + dur);
      };
      const initAudio = () => {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        bgmInterval = setInterval(() => {
          if (state.mode !== GameState.PLAYING) return;
          [220, 277, 330, 392][Math.floor((performance.now()/420)%4)] && sfx([220,277,330,392][Math.floor((performance.now()/420)%4)], 'triangle', .24, .018);
        }, 210);
      };

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        viewport.w = FIXED_VIEW.w; viewport.h = FIXED_VIEW.h;
        canvas.width = Math.floor(viewport.w * dpr); canvas.height = Math.floor(viewport.h * dpr); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const scale = Math.min(innerWidth / viewport.w, innerHeight / viewport.h);
        canvas.style.width = `${Math.floor(viewport.w * scale)}px`; canvas.style.height = `${Math.floor(viewport.h * scale)}px`;
        canvas.style.position = 'fixed'; canvas.style.left = '50%'; canvas.style.top = '50%'; canvas.style.transform = 'translate(-50%, -50%)';
      }


      window.__ABORT_RUN_DEBUG__ = {
        getMode: () => state.mode,
        getPlayer: () => ({ x: player.x, y: player.y, vx: player.vx, vy: player.vy, grounded: player.grounded }),
        getMissileProgress: () => missile.progress
      };

      function press() {
        initAudio(); state.hold = true;
        if (state.mode === GameState.TITLE) {
          resetGame(); state.mode = GameState.READY; sfx(660, 'square', .1, .07);
          if (readyTimeoutId) clearTimeout(readyTimeoutId);
          readyTimeoutId = setTimeout(() => { if (state.mode === GameState.READY) state.mode = GameState.PLAYING; }, state.readyTimer * 1000);
          return;
        }
        if (state.mode === GameState.CLEAR || state.mode === GameState.GAME_OVER) state.mode = GameState.TITLE;
      }
      function release() {
        if (state.mode !== GameState.PLAYING) { state.hold = false; return; }
        if (player.grounded) {
          const jumpPower = clamp(PLAYER.baseJumpPower + player.vx * PLAYER.jumpPowerFromSpeed, PLAYER.minJumpPower, PLAYER.maxJumpPower);
          player.vy = -jumpPower; player.grounded = false; sfx(480, 'square', .11, .08);
          for (let i = 0; i < 10; i++) particles.push({ x: player.x + 12 + Math.random()*18, y: player.y + player.height - 4, vx: -80 + Math.random()*160, vy: -40 - Math.random()*100, life: .45, color: '255,221,120' });
        }
        state.hold = false;
      }

      function resetGame() { Object.assign(player, { x:80,y:420,vx:0,vy:0,grounded:true }); player.effects.heavyGravityTimer = 0; player.effects.loadBoostTimer = 0; missile.progress = 0; state.readyTimer = 0.7; state.gameTime = 0; state.bestSpeed = 0; state.loadNoiseTaken = 0; state.delayCoreTaken = 0; state.loadNoiseHit = false; for (const obj of levelObjects) if (obj.type === 'delay_core') obj.consumed = false; }

      function update(dt) {
        state.pulseTime += dt;
        if (state.mode === GameState.READY) { state.readyTimer -= dt; if (state.readyTimer <= 0) state.mode = GameState.PLAYING; return; }
        if (state.mode !== GameState.PLAYING) return;
        state.gameTime += dt; state.hitFlashTimer = Math.max(0, state.hitFlashTimer - dt);
        for (const k in player.effects) player.effects[k] = Math.max(0, player.effects[k] - dt);
        let gravity = PLAYER.gravity; if (player.effects.heavyGravityTimer > 0) gravity *= 1.58;
        let loadSpeed = MISSILE.baseLoadSpeed; if (player.effects.loadBoostTimer > 0) loadSpeed *= 1.8;
        missile.progress = Math.min(100, missile.progress + loadSpeed * dt); if (missile.progress >= 100) return endGame(false, 'MISSILE LAUNCHED');
        if (player.grounded) { if (state.hold) player.vx = Math.min(PLAYER.maxGroundSpeed, player.vx + PLAYER.groundAcceleration * dt); }
        else { if (state.hold) { player.vy += (-player.vy) * PLAYER.airFloatStrength * dt; player.vx = Math.max(PLAYER.minAirSpeed, player.vx - PLAYER.airBrake * dt); } player.vy += gravity * dt; }

        const prevBottom = player.y + player.height; player.x += player.vx * dt; player.y += player.vy * dt; player.grounded = false;
        for (const obj of levelObjects) if (obj.type === 'platform') { const nextBottom = player.y + player.height; const overlapsX = player.x + player.width > obj.x && player.x < obj.x + obj.width; if (player.vy >= 0 && prevBottom <= obj.y + 6 && nextBottom >= obj.y && overlapsX) { player.y = obj.y - player.height; player.vy = 0; player.grounded = true; } }

        const rect = { x: player.x, y: player.y, width: player.width, height: player.height };
        for (const obj of levelObjects) {
          if (!intersect(rect, obj)) continue;
          if (obj.type === 'mud_floor') { player.vx = Math.max(95, player.vx - obj.slowPower * dt); state.hitFlashTimer = Math.max(state.hitFlashTimer, 0.18); sfx(180, 'sawtooth', .07, .05); }
          else if (obj.type === 'boost_pad') { player.vx = Math.max(player.vx, obj.boostPower + 220); sfx(820, 'triangle', .1, .06); }
          else if (obj.type === 'headwind_zone') { player.effects.heavyGravityTimer = Math.max(player.effects.heavyGravityTimer, obj.duration); state.hitFlashTimer = Math.max(state.hitFlashTimer, 0.22); }
          else if (obj.type === 'jammer_spike') { player.effects.loadBoostTimer = Math.max(player.effects.loadBoostTimer, obj.duration); if (!state.loadNoiseHit) { state.loadNoiseTaken++; state.loadNoiseHit = true; sfx(120, 'square', .16, .07); } state.hitFlashTimer = Math.max(state.hitFlashTimer, 0.28); }
          else if (obj.type === 'laser_gate') { return endGame(false, 'LASER CONTACT'); }
          else if (obj.type === 'delay_core' && !obj.consumed) {
            obj.consumed = true;
            missile.progress = Math.max(0, missile.progress - obj.loadReduce);
            state.delayCoreTaken++;
            sfx(560, 'triangle', .16, .08);
          }
        }

        if (hasReachedGoalLine()) return endGame(true, 'ABORT COMPLETE');
        if (player.x + player.width < 3600 || player.x > 3700) state.loadNoiseHit = false;
        if (player.y > FALL_DEATH_Y) respawnNearPlatform();

        const loadWorldX = STAGE_LENGTH * (missile.progress / 100);
        if (loadWorldX >= GOAL_X) return endGame(false, 'LOAD SEQUENCE REACHED GOAL');
        state.warningPulse = clamp((300 - (GOAL_X - loadWorldX)) / 300, 0, 1);
        const targetCam = player.x - viewport.w * 0.35; state.camX += (targetCam - state.camX) * 0.12; state.camX = clamp(state.camX, 0, STAGE_LENGTH - viewport.w + 240); state.bestSpeed = Math.max(state.bestSpeed, player.vx);

        for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 320 * dt; p.life -= dt; }
        while (particles.length && particles[0].life <= 0) particles.shift();
      }

      let endMessage = '';
      const endGame = (clear, msg) => { endMessage = msg; state.mode = clear ? GameState.CLEAR : GameState.GAME_OVER; sfx(clear ? 980 : 150, clear ? 'triangle' : 'sawtooth', .25, .09); };
      const rank = () => missile.progress < 50 ? 'S' : missile.progress < 65 ? 'A' : missile.progress < 80 ? 'B' : missile.progress < 95 ? 'C' : 'D';

      function drawPlayer() {
        const bob = Math.sin(state.pulseTime * 10) * 1.8;
        ctx.save(); ctx.translate(player.x + player.width / 2, player.y + player.height / 2 + bob);
        ctx.fillStyle = '#d7f0ff'; ctx.fillRect(-16, -18, 32, 36);
        ctx.fillStyle = '#7dd8ff'; ctx.beginPath(); ctx.arc(0, -26, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#12263f'; ctx.fillRect(-5, -29, 3, 3); ctx.fillRect(2, -29, 3, 3);
        ctx.fillStyle = '#8cf3cd'; ctx.fillRect(-20, 10, 40, 6);
        ctx.restore();
      }

      function draw() {
        const w = viewport.w, h = viewport.h;
        const sky = ctx.createLinearGradient(0, 0, 0, h); sky.addColorStop(0, '#0e1838'); sky.addColorStop(1, '#060a16'); ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);
        for (let i=0; i<90; i++) { ctx.fillStyle = `rgba(180,200,255,${0.12 + (i%4)*0.03})`; ctx.fillRect((i*137 - state.camX*0.25)% (w+50), 40 + (i*71)%280, 2, 2); }

        ctx.save(); ctx.translate(-state.camX, 0);
        for (const obj of levelObjects) {
          if (obj.type === 'platform') { const g = ctx.createLinearGradient(0, obj.y, 0, obj.y + obj.height); g.addColorStop(0, '#465272'); g.addColorStop(1, '#242d42'); ctx.fillStyle = g; ctx.fillRect(obj.x, obj.y, obj.width, obj.height); }
          if (obj.type === 'mud_floor') {
            ctx.fillStyle = '#5f4228'; ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
            ctx.strokeStyle = 'rgba(161,120,83,.8)'; ctx.lineWidth = 2;
            for (let i = 0; i < obj.width; i += 28) { ctx.beginPath(); ctx.arc(obj.x + i + 14, obj.y + 12 + Math.sin((state.pulseTime * 4) + i * 0.1) * 2, 6, 0, Math.PI); ctx.stroke(); }
          }
          if (obj.type === 'boost_pad') {
            ctx.fillStyle = '#28d7ff'; ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
            ctx.fillStyle = '#d5f7ff';
            for (let i = 0; i < 4; i++) {
              const bx = obj.x + 18 + i * 48;
              ctx.beginPath(); ctx.moveTo(bx, obj.y + 4); ctx.lineTo(bx + 20, obj.y + obj.height / 2); ctx.lineTo(bx, obj.y + obj.height - 4); ctx.closePath(); ctx.fill();
            }
          }
          if (obj.type === 'headwind_zone') {
            ctx.fillStyle = 'rgba(172,116,255,.24)'; ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
            ctx.strokeStyle = 'rgba(215,180,255,.65)';
            for (let y = obj.y + 24; y < obj.y + obj.height; y += 34) { ctx.beginPath(); ctx.moveTo(obj.x + 18, y); ctx.quadraticCurveTo(obj.x + obj.width / 2, y - 12, obj.x + obj.width - 18, y); ctx.stroke(); }
          }
          if (obj.type === 'jammer_spike') { ctx.fillStyle = '#ec4f67'; ctx.beginPath(); ctx.moveTo(obj.x + obj.width / 2, obj.y); ctx.lineTo(obj.x + obj.width, obj.y + obj.height); ctx.lineTo(obj.x, obj.y + obj.height); ctx.closePath(); ctx.fill(); ctx.fillStyle = '#fff3f5'; ctx.fillText('!', obj.x + obj.width / 2 - 3, obj.y + 42); }
          if (obj.type === 'laser_gate') {
            const alpha = 0.5 + Math.sin(state.pulseTime * 9) * 0.25;
            ctx.fillStyle = `rgba(255,40,40,${alpha})`; ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
            ctx.fillStyle = 'rgba(255,170,170,.5)'; ctx.fillRect(obj.x + 10, obj.y, 8, obj.height);
          }
          if (obj.type === 'delay_core' && !obj.consumed) {
            ctx.fillStyle = '#53ff8c';
            const cx = obj.x + obj.width / 2; const cy = obj.y + obj.height / 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
              const ang = Math.PI / 3 * i + state.pulseTime * 0.4;
              const px = cx + Math.cos(ang) * 24; const py = cy + Math.sin(ang) * 24;
              if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#0f3f24'; ctx.fillText('↓', cx - 6, cy + 7);
          }
          if (obj.type === 'goal') { ctx.fillStyle = '#93fda5'; ctx.fillRect(obj.x, obj.y, obj.width, obj.height); ctx.fillStyle = '#113828'; ctx.fillText('GOAL', obj.x + 14, obj.y + 50); }
        }

        const loadWorldX = STAGE_LENGTH * (missile.progress / 100);
        ctx.fillStyle = 'rgba(255,45,45,.55)'; ctx.fillRect(loadWorldX - 8, 0, 16, h);
        drawPlayer();
        for (const p of particles) { ctx.fillStyle = `rgba(${p.color},${Math.max(0,p.life*2)})`; ctx.beginPath(); ctx.arc(p.x, p.y, 2.8, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();

        ctx.fillStyle = '#e8f3ff'; ctx.font = 'bold 18px sans-serif'; ctx.fillText(`LOAD ${missile.progress.toFixed(1)}%`, 14, 28); ctx.fillText(`DIST ${((STAGE_LENGTH - player.x)/3).toFixed(0)}m`, 14, 52); ctx.fillText(`SPD ${player.vx.toFixed(0)}`, 14, 76);
        ctx.fillStyle = '#2a2f3f'; ctx.fillRect(180, 12, w - 200, 12); ctx.fillStyle = '#ff5252'; ctx.fillRect(180, 12, (w - 200) * (missile.progress / 100), 12);

        if (state.mode === GameState.TITLE) overlay('ABORT RUN', 'HOLD to sprint / RELEASE to jump\nTAP TO START');
        if (state.showInfo) drawInfoPanel();
        else if (state.mode === GameState.READY) overlay(`${Math.ceil(state.readyTimer)}`, 'RUN');
        else if (state.mode === GameState.CLEAR) overlay('ABORT COMPLETE', `TIME ${state.gameTime.toFixed(2)}s / LOAD ${missile.progress.toFixed(1)}% / RANK ${rank()}\nTAP TO TITLE`);
        else if (state.mode === GameState.GAME_OVER) overlay('MISSION FAILED', `${endMessage}\nTAP TO TITLE`);

        if (state.warningPulse > 0 && state.mode === GameState.PLAYING) { ctx.strokeStyle = `rgba(255,40,40,${0.2 + 0.55 * state.warningPulse})`; ctx.lineWidth = 18; ctx.strokeRect(0, 0, w, h); }
        if (state.hitFlashTimer > 0 && state.mode === GameState.PLAYING) { const alpha = clamp(state.hitFlashTimer / 0.28, 0, 1) * 0.5; ctx.fillStyle = `rgba(255, 110, 110, ${alpha})`; ctx.fillRect(0, 0, w, h); }
        ctx.fillStyle = 'rgba(210,220,255,.72)'; ctx.font = '12px monospace'; ctx.fillText(`ver ${GAME_VERSION}`, w - 108, h - 12);
      }

      function respawnNearPlatform() { const maxRespawnDistance = 900; let nearest = null; let nearestDist = Infinity; for (const obj of levelObjects) { if (obj.type !== 'platform') continue; const platformTop = obj.y - player.height; const candidateX = clamp(player.x, obj.x + 18, obj.x + obj.width - player.width - 18); const dist = Math.hypot(candidateX - player.x, platformTop - player.y); if (dist <= maxRespawnDistance && dist < nearestDist) { nearestDist = dist; nearest = { x: candidateX, y: platformTop }; } } if (!nearest) return endGame(false, 'SIGNAL LOST'); Object.assign(player, { x: nearest.x, y: nearest.y, vx: 0, vy: 0, grounded: true }); }
      function overlay(title, subtitle) { const w = viewport.w, h = viewport.h; ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(0,0,w,h); ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 52px sans-serif'; ctx.fillText(title, w/2, h/2 - 22); ctx.font = 'bold 22px sans-serif'; subtitle.split('\n').forEach((line,i)=>ctx.fillText(line, w/2, h/2 + 26 + i*28)); ctx.textAlign = 'start'; }
      function drawInfoPanel() {
        const w = viewport.w;
        const x = 70; const y = 120; const panelW = w - 140; const panelH = 250;
        ctx.fillStyle = 'rgba(4,10,24,.82)'; ctx.fillRect(x, y, panelW, panelH);
        ctx.strokeStyle = 'rgba(156,203,255,.5)'; ctx.lineWidth = 2; ctx.strokeRect(x, y, panelW, panelH);
        ctx.fillStyle = '#d9ecff'; ctx.font = 'bold 28px sans-serif'; ctx.fillText('障害物・ギミック説明', x + 24, y + 42);
        ctx.font = '20px sans-serif';
        const lines = [
          '赤レーザーゲート: 接触で即ミッション失敗。上側に通過スペースあり。',
          '赤スパイク: 接触中はLOADの進行が早くなる（危険）。',
          '紫ゾーン: 空中で重くなって落下しやすい。',
          '茶色泥床: 速度低下。水色ブースト床: 速度上昇。緑コア: LOADを少し巻き戻す。',
          '操作: 長押しで加速 / 離してジャンプ（?ボタンでこの説明を開閉）'
        ];
        lines.forEach((line, i) => ctx.fillText(line, x + 24, y + 84 + i * 30));
      }

      let last = performance.now();
      function loop(t) { const dt = Math.min(0.033, (t - last) / 1000); last = t; update(dt); draw(); requestAnimationFrame(loop); }
      window.addEventListener('resize', resize);
      window.addEventListener('pointerdown', (e) => { e.preventDefault(); press(); });
      window.addEventListener('pointerup', (e) => { e.preventDefault(); release(); });
      window.addEventListener('pointercancel', release);
      infoBtn.addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault(); state.showInfo = !state.showInfo; });
      window.addEventListener('blur', () => { if (state.mode === GameState.PLAYING || state.mode === GameState.READY) { state.prevMode = state.mode; state.mode = GameState.PAUSED; } });
      window.addEventListener('focus', () => { if (state.mode === GameState.PAUSED) state.mode = state.prevMode; });
      resize(); requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
