<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影踏みシアター - Prototype</title>
  <style>
    body { margin:0; background:#111; color:#eee; font-family:system-ui, sans-serif; }
    #wrap { display:flex; justify-content:center; padding:12px; }
    canvas { border:1px solid #444; image-rendering: pixelated; width:min(100%, 960px); height:auto; }
    #hud { width:min(960px, calc(100vw - 24px)); margin:0 auto; font-size:14px; line-height:1.5; }
    .muted{ color:#aaa; }
    #touch-controls { display:none; width:min(960px, calc(100vw - 24px)); margin:10px auto 16px; gap:8px; }
    .touch-row { display:flex; justify-content:space-between; gap:8px; }
    .touch-group { display:flex; gap:8px; }
    .touch-btn {
      flex:1;
      border:1px solid #555;
      border-radius:10px;
      background:#222;
      color:#eee;
      font-size:15px;
      min-height:44px;
      touch-action:none;
    }
    .touch-btn:active { background:#444; }
    @media (max-width: 900px), (pointer: coarse) {
      #touch-controls { display:grid; }
      #hud { font-size:13px; }
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
  <div id="touch-controls" aria-label="mobile controls">
    <div class="touch-row">
      <div class="touch-group">
        <button class="touch-btn" data-key="ArrowLeft">◀</button>
        <button class="touch-btn" data-key="ArrowRight">▶</button>
        <button class="touch-btn" data-key="Space">⤒ Jump</button>
      </div>
      <div class="touch-group">
        <button class="touch-btn" data-key="KeyA">A-</button>
        <button class="touch-btn" data-key="KeyD">D+</button>
        <button class="touch-btn" data-key="KeyW">W+</button>
        <button class="touch-btn" data-key="KeyS">S-</button>
        <button class="touch-btn" data-key="KeyE">Lock</button>
      </div>
    </div>
  </div>
  <div id="hud"></div>
  <script src="src/game.js"></script>
</body>
</html>
